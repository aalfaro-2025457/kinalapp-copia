<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register</title>
    <link rel="stylesheet" th:href="@{/styles/style.css}">
    <link rel="icon" th:href="@{/images/icons/kinal-icon.png}" type="image/x-icon">
</head>

<body>
    <main class="login">

        <h1 class="title">KinalApp by Angel Alfaro</h1>
        <div th:if="${error}" class="error">
            <span th:text="${error}">Error message</span>
        </div>
        <h2 class="title">Register</h2>
        <form class="card" th:action="@{register}" th:object="${user}" method="post">
            <label class="label" for="">Username</label>
            <input th:field="*{usernameUser}" class="textfield" type="text" placeholder="aalfaro-2025457"
                name="username" id="username" required>
            <label class="label" for="">E-mail</label>
            <input th:field="*{emailUser}" class="textfield" type="email" placeholder="aalfaro-2025457@kinal.edu.gt"
                name="email" id="email" required>
            <label class="label" for="">Password</label>
            <input th:field="*{passwordUser}" class="textfield" type="password" placeholder="admin123" name="password"
                id="password" required>
            <button class="btn">Register</button>
        </form>
        <h3 class="title">¿Ya tienes una cuenta?, <a class="anchor" th:href="@{login}">Ingresa aqui!!</a></h3>
    </main>
</body>

</html>
