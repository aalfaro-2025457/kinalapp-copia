<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login</title>
    <link rel="stylesheet" th:href="@{/styles/style.css}" href="../../static/styles/style.css">
</head>
<body>
    <main class="login">
        <h1 class="title">Login</h1>
        <form class="card" th:action="">
            <label class="label" for="">Username</label>
            <input class="textfield" type="text" placeholder="aalfaro-2025457" name="username" id="username" required>
            <label class="label" for="">Password</label>
            <input class="textfield" type="password" placeholder="admin123" required>
            <button class="btn">Log in</button>
        </form>
        <h3 class="title">¿No tienes usuario?, <a th:href="" href="">Registrate aqui</a></h3>
    </main>
</body>
</html>
