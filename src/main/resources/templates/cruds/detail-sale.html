<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <title>Detalles de Venta</title>
    <link rel="stylesheet" th:href="@{/styles/style.css}">
    <link rel="icon" th:href="@{/images/icons/kinal-icon.png}" type="image/x-icon">
</head>

<body>
    <div class="main-wrapper">
        <nav class="sidebar">
            <ul class="list">
                <li class="sidebar-item"><a th:href="@{/home}"><svg xmlns="http://www.w3.org/2000/svg" height="64px" viewBox="0 -960 960 960" width="64px" fill="#FFFFFF"><path d="M359-242 120-481l239-239 43 43-166 166h604v60H236l166 166-43 43Z" /></svg></a></li>
                <li class="sidebar-item"><a th:href="@{/home}"><svg xmlns="http://www.w3.org/2000/svg" height="64px" viewBox="0 -960 960 960" width="64px" fill="#FFFFFF"><path d="M220-180h150v-250h220v250h150v-390L480-765 220-570v390Zm-60 60v-480l320-240 320 240v480H530v-250H430v250H160Zm320-353Z" /></svg></a></li>
                <li class="sidebar-item"><a th:href="@{/login}"><svg xmlns="http://www.w3.org/2000/svg" height="64px" viewBox="0 -960 960 960" width="64px" fill="#FFFFFF"><path d="M180-120q-24 0-42-18t-18-42v-600q0-24 18-42t42-18h299v60H180v600h299v60H180Zm486-185-43-43 102-102H360v-60h363L621-612l43-43 176 176-174 174Z" /></svg></a></li>
            </ul>
        </nav>

        <main class="clients-view">
            <h1 class="title">Detalles de Venta</h1>
            <h3 class="title">Gestión de productos por transacción</h3>

            <form class="card" th:action="@{/view/detail-sales/save}" th:object="${newDetail}" method="post">
                <div class="card form">
                    <div class="container">
                        <label class="label">Código Detalle</label>
                        <input class="textfield" type="number" th:field="*{codeDetailSale}" readonly
                            style="background-color: #e9e9e9; cursor: not-allowed;">
                    </div>

                    <div class="container">
                        <label class="label">Venta (ID)</label>
                        <select class="textfield" th:field="*{saleDetailSale}">
                            <option value="" disabled selected>Seleccione una venta</option>
                            <option th:each="s : ${sales}" th:value="${s.codeSale}"
                                th:text="'Venta #' + ${s.codeSale} + ' - ' + ${s.clientSale.nameClient}"></option>
                        </select>
                    </div>

                    <div class="container">
                        <label class="label">Producto</label>
                        <select class="textfield" th:field="*{productDetailProduct}">
                            <option value="" disabled selected>Seleccione un producto</option>
                            <option th:each="p : ${products}" th:value="${p.codeProduct}" th:text="${p.nameProduct}"></option>
                        </select>
                    </div>

                    <div class="container">
                        <label class="label">Cantidad</label>
                        <input class="textfield" type="number" th:field="*{amountDetailSale}">
                    </div>

                    <div class="container">
                        <label class="label">Precio Unitario</label>
                        <input class="textfield" type="number" step="0.01" th:field="*{unitPriceDetailSale}">
                    </div>

                    <div class="container">
                        <label class="label">Subtotal</label>
                        <input class="textfield" type="number" step="0.01" th:field="*{subtotal}">
                    </div>
                </div>
                <button type="submit" class="btn">Aceptar</button>
            </form>

            <form th:action="@{/view/detail-sales/search}" method="get" class="card"
                style="margin: 2rem 0; display: flex; gap: 1rem; align-items: center; padding: 1rem;">
                <input type="number" name="codeSearch" class="textfield" placeholder="Buscar por código de detalle..."
                    style="flex: 1;">
                <button type="submit" class="btn bg-green2">Buscar</button>
                <a th:href="@{/view/detail-sales}" class="btn bg-red2" style="text-decoration: none;">Limpiar</a>
            </form>

            <section class="clients">
                <article th:each="d : ${details}" class="card client bg-orange">
                    <h3 class="title" th:text="'Detalle ID: ' + ${d.codeDetailSale}"></h3>
                    <h3 class="title" th:text="'Venta: #' + ${d.saleDetailSale.codeSale}"></h3>
                    <h3 class="title" th:text="'Producto: ' + ${d.productDetailProduct.nameProduct}"></h3>

                    <h3 class="title" th:text="'Cantidad: ' + ${d.amountDetailSale}"></h3>
                    <h3 class="title" th:text="'Precio U: Q' + ${d.unitPriceDetailSale}"></h3>
                    <h3 class="title" th:text="'Subtotal: Q' + ${d.subtotal}"></h3>

                    <div class="client-actions">
                        <a th:href="@{/view/detail-sales/edit/{code}(code=${d.codeDetailSale})}" class="btn bg-orange2">Editar</a>
                        <a th:href="@{/view/detail-sales/delete/{code}(code=${d.codeDetailSale})}"
                            class="btn bg-red2">Eliminar</a>
                    </div>
                </article>
            </section>
        </main>
    </div>
    <footer class="footer">
        <h3 class="title">@Copyright Angel Alfaro</h3>
    </footer>
</body>
</html>
