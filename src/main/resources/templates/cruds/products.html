<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <title>Productos</title>
    <link rel="stylesheet" th:href="@{/styles/style.css}" href="../../static/styles/style.css">
    <link rel="icon" th:href="@{/images/icons/kinal-icon.png}" type="image/x-icon">
</head>

<body>
    <div class="main-wrapper">
        <nav class="sidebar">
            <ul class="list">
                <li class="sidebar-item"><a th:href="@{/home}"><svg xmlns="http://www.w3.org/2000/svg" height="64px"
                            viewBox="0 -960 960 960" width="64px" fill="#FFFFFF">
                            <path d="M359-242 120-481l239-239 43 43-166 166h604v60H236l166 166-43 43Z" />
                        </svg></a></li>
                <li class="sidebar-item"><a th:href="@{/home}"><svg xmlns="http://www.w3.org/2000/svg" height="64px"
                            viewBox="0 -960 960 960" width="64px" fill="#FFFFFF">
                            <path
                                d="M220-180h150v-250h220v250h150v-390L480-765 220-570v390Zm-60 60v-480l320-240 320 240v480H530v-250H430v250H160Zm320-353Z" />
                        </svg></a></li>
                <li class="sidebar-item"><a th:href="@{/login}"><svg xmlns="http://www.w3.org/2000/svg" height="64px"
                            viewBox="0 -960 960 960" width="64px" fill="#FFFFFF">
                            <path
                                d="M180-120q-24 0-42-18t-18-42v-600q0-24 18-42t42-18h299v60H180v600h299v60H180Zm486-185-43-43 102-102H360v-60h363L621-612l43-43 176 176-174 174Z" />
                        </svg></a></li>
            </ul>
        </nav>

        <main class="clients-view">
            <h1 class="title">Productos</h1>
            <h3 class="title">Gestión de inventario de productos</h3>

            <form class="card" th:action="@{/view/products/save}" th:object="${newProduct}" method="post">
                <div class="card form">
                    <div class="container">
                        <label class="label">Código de Producto</label>
                        <input class="textfield" type="number" th:field="*{codeProduct}" readonly
                            style="background-color: #e9e9e9; cursor: not-allowed;" placeholder="ID Automático" required>
                    </div>
                    <div class="container">
                        <label class="label">Nombre del Producto</label>
                        <input class="textfield" type="text" th:field="*{nameProduct}" placeholder="Ej: Playera Polo" required>
                    </div>
                    <div class="container">
                        <label class="label">Precio</label>
                        <input class="textfield" type="number" step="0.01" th:field="*{priceProduct}"
                            placeholder="0.00" required>
                    </div>
                    <div class="container">
                        <label class="label">Stock</label>
                        <input class="textfield" type="number" th:field="*{stockProduct}" placeholder="10" required>
                    </div>
                    <div class="container">
                        <label class="label">Estado (1: Activo, 0: Inactivo)</label>
                        <input class="textfield" type="number" th:field="*{stateProduct}" required>
                    </div>
                </div>
                <button type="submit" class="btn">Añadir</button>
            </form>

            <form th:action="@{/view/products/search}" method="get" class="card"
                style="margin-bottom: 2rem; display: flex; gap: 1rem; align-items: center; padding: 1rem;">
                <input type="number" name="codeSearch" class="textfield" placeholder="Buscar por código..."
                    style="flex: 1;" required>
                <button type="submit" class="btn bg-green2">Buscar</button>
                <a th:href="@{/view/products}" class="btn bg-red2" style="text-decoration: none;">Limpiar</a>
            </form>

            <section class="clients">
                <article th:each="product : ${products}" class="card client bg-red">
                    <h3 class="title" th:text="'Código: ' + ${product.codeProduct}"></h3>
                    <h3 class="title" th:text="'Producto: ' + ${product.nameProduct}"></h3>
                    <h3 class="title" th:text="'Precio: Q' + ${product.priceProduct}"></h3>
                    <h3 class="title" th:text="'Stock: ' + ${product.stockProduct}"></h3>
                    <h3 class="title" th:text="'Estado: ' + ${product.stateProduct}"></h3>

                    <div class="client-actions">
                        <a th:href="@{/view/products/edit/{code}(code=${product.codeProduct})}"
                            class="btn bg-red21">Editar</a>
                        <a th:href="@{/view/products/delete/{code}(code=${product.codeProduct})}"
                            class="btn bg-red2">Eliminar</a>
                    </div>
                </article>
            </section>
        </main>
    </div>
    <footer class="footer">
        <h3 class="title">@Copyright Angel Alfaro</h3>
    </footer>
</body>

</html>
